name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rust Tests & Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        working-directory: rust/amplihack-memory
        run: cargo fmt --check

      - name: Clippy (default features)
        working-directory: rust/amplihack-memory
        run: cargo clippy -- -D warnings

      - name: Clippy (ladybug feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features ladybug -- -D warnings

      - name: Clippy (python feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features python -- -D warnings

      - name: Run tests
        working-directory: rust/amplihack-memory
        run: cargo test

      - name: Run tests (ladybug feature)
        working-directory: rust/amplihack-memory
        run: cargo test --features ladybug

      - name: Build docs
        working-directory: rust/amplihack-memory
        run: cargo doc --no-deps

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x --tb=short
