name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rust Tests & Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check formatting
        working-directory: rust/amplihack-memory
        run: cargo fmt --check

      - name: Clippy (default features)
        working-directory: rust/amplihack-memory
        run: cargo clippy -- -D warnings

      # TODO: Re-enable once ladybug-graph-rs exposes real types (Property, Graph, GraphConfig, etc.)
      # Currently the crate is a stub (`pub fn stub() {}`) causing ~31 compile errors.
      - name: Clippy (ladybug feature)
        if: false
        working-directory: rust/amplihack-memory
        run: cargo clippy --features ladybug -- -D warnings

      - name: Clippy (python feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features python -- -D warnings

      - name: Run tests
        working-directory: rust/amplihack-memory
        run: cargo test

      # TODO: Re-enable once ladybug-graph-rs is implemented (see Clippy step above).
      - name: Run tests (ladybug feature)
        if: false
        working-directory: rust/amplihack-memory
        run: cargo test --features ladybug

      # kuzu feature requires pyo3 (needs Python) and may need a running Kuzu DB
      # instance for integration tests — allow failure until CI has Kuzu provisioned.
      - name: Run tests (kuzu feature)
        working-directory: rust/amplihack-memory
        continue-on-error: true
        run: cargo test --features kuzu

      - name: Run tests (python feature)
        working-directory: rust/amplihack-memory
        run: cargo test --features python

      # The v40 -> v41 on-disk store-format migration (issue #100) must NEVER
      # regress into data loss, so the no-data-loss proof is a BLOCKING gate.
      # It is fast and deterministic: lbug 0.17.x links a prebuilt engine archive
      # (no from-source C++ compile), opens a committed v40 fixture store, and
      # asserts it opens Clean (never RebuiltAfterCorruption) with every node and
      # edge intact, then upgrades to v41 on checkpoint. See
      # docs/lbug_0_17_upgrade.md.
      - name: Data-loss gate (v40 store opens losslessly under lbug 0.17.x)
        working-directory: rust/amplihack-memory
        run: cargo test --features persistent --lib graph::lbug_store::tests::v40

      # The remaining persistent-feature suite includes the probabilistic
      # 400-round CSR delete+checkpoint churn (reproduces_issue_100_*), a native
      # stress test kept non-blocking to avoid CI flakiness from rare native
      # crashes upstream. The data-loss gate above is the blocking guarantee.
      - name: Run tests (persistent feature)
        working-directory: rust/amplihack-memory
        continue-on-error: true
        run: cargo test --features persistent

      - name: Build docs
        working-directory: rust/amplihack-memory
        run: cargo doc --no-deps

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit
        working-directory: rust/amplihack-memory
        # pyo3 0.22 is an OPTIONAL dependency (only the python/kuzu features pull
        # it in; the default build and the persistent/lbug backend do not). It has
        # two open RUSTSEC advisories whose only fix is a major upgrade to
        # pyo3 >= 0.29, tracked separately from this de-fork work. cargo-deny's
        # feature-aware check already excludes pyo3 from the default graph;
        # cargo-audit scans the whole lockfile, so ignore them explicitly here:
        #   RUSTSEC-2026-0177 - missing Sync bound on PyCFunction::new_closure
        #   RUSTSEC-2025-0020 - buffer-overflow risk in PyString::from_object
        run: cargo audit --ignore RUSTSEC-2026-0177 --ignore RUSTSEC-2025-0020

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Supply chain check
        working-directory: rust/amplihack-memory
        run: cargo deny check

  msrv:
    name: MSRV (1.85) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      # Bumped from 1.80 → 1.85: clap_builder ≥4.6.0 requires edition2024 (stable in 1.85).
      - uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Run tests (MSRV)
        working-directory: rust/amplihack-memory
        run: cargo test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x --tb=short
