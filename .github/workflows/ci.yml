name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: jobs only read repository contents. Any job needing
# more must opt in explicitly below.
permissions: {}

jobs:
  test:
    name: Rust Tests & Lints
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Check formatting
        working-directory: rust/amplihack-memory
        run: cargo fmt --check

      - name: Clippy (default features)
        working-directory: rust/amplihack-memory
        run: cargo clippy -- -D warnings

      # TODO: Re-enable once ladybug-graph-rs exposes real types (Property, Graph, GraphConfig, etc.)
      # Currently the crate is a stub (`pub fn stub() {}`) causing ~31 compile errors.
      - name: Clippy (ladybug feature)
        if: false
        working-directory: rust/amplihack-memory
        run: cargo clippy --features ladybug -- -D warnings

      - name: Clippy (python feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features python -- -D warnings

      # Design C coordination layer (issue #137): clippy must be clean across the
      # whole coord feature matrix — the consumer-only build (coord), the read
      # client (coord,ipc), and the full daemon set (coord,ipc,persistent, which
      # links the prebuilt lbug engine). `--tests` also lints the TDD contract
      # test files that pin the layer's invariants.
      - name: Clippy (coord feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features coord --tests -- -D warnings

      - name: Clippy (coord,ipc features)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features coord,ipc --tests -- -D warnings

      - name: Clippy (coord,ipc,persistent — full daemon set)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features coord,ipc,persistent --tests -- -D warnings

      - name: Run tests
        working-directory: rust/amplihack-memory
        run: cargo test

      # TODO: Re-enable once ladybug-graph-rs is implemented (see Clippy step above).
      - name: Run tests (ladybug feature)
        if: false
        working-directory: rust/amplihack-memory
        run: cargo test --features ladybug

      # kuzu feature requires pyo3 (needs Python) and may need a running Kuzu DB
      # instance for integration tests — allow failure until CI has Kuzu provisioned.
      - name: Run tests (kuzu feature)
        working-directory: rust/amplihack-memory
        continue-on-error: true
        run: cargo test --features kuzu

      - name: Run tests (python feature)
        working-directory: rust/amplihack-memory
        run: cargo test --features python

      # The v40 -> v41 on-disk store-format migration (issue #100) must NEVER
      # regress into data loss, so the no-data-loss proof is a BLOCKING gate.
      # It is fast and deterministic: lbug 0.17.x links a prebuilt engine archive
      # (no from-source C++ compile), opens a committed v40 fixture store, and
      # asserts it opens Clean (never RebuiltAfterCorruption) with every node and
      # edge intact, then upgrades to v41 on checkpoint.
      #
      # This selector also covers the issue #107 "silent empty-read" guards (all
      # named with the `v40_` prefix): the legacy-schema read-parity regressions
      # (`v40_legacy_store_*` — a store whose tables predate the `_deleted`
      # tombstone column must NOT read back empty), the empty-read safety-gate
      # trip+seal test (`v40_empty_read_gate_*`), and the env-gated real-store
      # parity check (`v40_real_store_parity_*`, skipped when no real store is
      # present). See docs/lbug_0_17_upgrade.md.
      - name: Data-loss gate (v40 lossless open + #107 empty-read parity/gate)
        working-directory: rust/amplihack-memory
        run: cargo test --features persistent --lib graph::lbug_store::tests::v40

      # #2550 data-loss gate — non-destructive corrupt-WAL open recovery. These
      # deterministic (no sleeps/network/probabilistic-churn) regressions prove a
      # corrupt WAL tail is recovered without an assertion/crash, the full
      # pre-corruption prefix survives, and — critically — recovery stays durable
      # across a strict reopen even when the checkpoint-after-recovery fails (the
      # verified incident where recovered memories were reset to empty).
      - name: Data-loss gate (corrupt-WAL non-destructive recovery, #2550)
        working-directory: rust/amplihack-memory
        run: cargo test --features persistent --lib -- graph::lbug_store::tests::open_with_recovery graph::lbug_store::tests::recovery_is_durable

      # The remaining persistent-feature suite includes the probabilistic
      # 400-round CSR delete+checkpoint churn (reproduces_issue_100_*), a native
      # stress test kept non-blocking to avoid CI flakiness from rare native
      # crashes upstream. The data-loss gate above is the blocking guarantee.
      - name: Run tests (persistent feature)
        working-directory: rust/amplihack-memory
        continue-on-error: true
        run: cargo test --features persistent

      # Design C coordination layer (issue #137) — BLOCKING gates. Unlike the
      # persistent suite above (non-blocking due to a rare native CSR-churn
      # flake), these coord gates are deterministic and must pass. The coord-only
      # runs need no C++ toolchain; the full-daemon run links the prebuilt lbug
      # engine and exercises the applier + IPC read plane against a real store.
      - name: Run tests (coord — consumer surface, no lbug)
        working-directory: rust/amplihack-memory
        run: cargo test --features coord

      - name: Run tests (coord,ipc — read client)
        working-directory: rust/amplihack-memory
        run: cargo test --features coord,ipc

      - name: Run tests (coord,ipc,persistent — durable log, fenced applier, IPC)
        working-directory: rust/amplihack-memory
        run: >-
          cargo test --features coord,ipc,persistent
          --test lease_epoch_fencing
          --test durable_log
          --test multi_process_concurrent_append
          --test applier_exactly_once
          --test writer_client
          --test no_direct_open
          --test ipc_transport

      - name: Run tests (coord module unit tests, full daemon set)
        working-directory: rust/amplihack-memory
        run: "cargo test --features coord,ipc,persistent --lib coord::"

      # The TLA+ model checks are the source of truth for the coordination
      # design's invariants (NoSplitBrain, PrefixConsistency, NoLostAckedWrite).
      # A single script runs all four checks and asserts each one's expected
      # polarity (2 positive-clean, 2 negative-violated). BLOCKING.
      - name: Install JRE for TLA+ model checking
        run: sudo apt-get update && sudo apt-get install -y default-jre-headless

      - name: TLA+ spec gate (specs/run-checks.sh)
        run: bash specs/run-checks.sh

      - name: Build docs
        working-directory: rust/amplihack-memory
        run: cargo doc --no-deps

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit
        working-directory: rust/amplihack-memory
        # pyo3 0.22 is an OPTIONAL dependency (only the python/kuzu features pull
        # it in; the default build and the persistent/lbug backend do not). It has
        # two open RUSTSEC advisories whose only fix is a major upgrade to
        # pyo3 >= 0.29, tracked separately from this de-fork work. cargo-deny's
        # feature-aware check already excludes pyo3 from the default graph;
        # cargo-audit scans the whole lockfile, so ignore them explicitly here:
        #   RUSTSEC-2026-0177 - missing Sync bound on PyCFunction::new_closure
        #   RUSTSEC-2025-0020 - buffer-overflow risk in PyString::from_object
        run: cargo audit --ignore RUSTSEC-2026-0177 --ignore RUSTSEC-2025-0020

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Supply chain check
        working-directory: rust/amplihack-memory
        run: cargo deny check

  lbug-from-source:
    name: lbug from-source ABI proof (issue #3119)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # From-source lbug needs the full native toolchain (the same inputs the
      # platform installer's preflight doctor provisions on a deploy host).
      - name: Install native build toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-lbugsrc-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lbugsrc-

      # PROOF of the issue #3119 fix: compile lbug FROM SOURCE against this
      # runner's libstdc++ (no prebuilt), then open a real persistent store so
      # Database::initBufferManager runs — the exact code path that segfaults in
      # std::vformat when a prebuilt lbug's std::format ABI mismatches the host.
      # If from-source cognitive-memory init is broken, this job fails.
      - name: Build + open a from-source lbug store
        working-directory: rust/amplihack-memory
        env:
          LBUG_BUILD_FROM_SOURCE: "1"
          LBUG_RUST_BUILD_FROM_SOURCE: "1"
        run: |
          cargo build --features persistent
          cargo test --features persistent --lib -- graph::lbug_store::tests::open_with_recovery

  msrv:
    name: MSRV (1.85) Verification
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      # Bumped from 1.80 → 1.85: clap_builder ≥4.6.0 requires edition2024 (stable in 1.85).
      - uses: dtolnay/rust-toolchain@c56a35af9328d0bc581dc86c05e58f97f7c38a0e # 1.85

      - name: Cache cargo dependencies
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Run tests (MSRV)
        working-directory: rust/amplihack-memory
        run: cargo test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x --tb=short

  # Formal-methods gate: model-check the multi-writer coordination design
  # (epoch fencing + durable shared log) for the lbug-backed store. This job
  # fails if the safety invariant regresses — a positive check finding an error
  # OR a negative check no longer demonstrating its intentional violation. All
  # check/polarity logic lives in specs/run-checks.sh (single source of truth);
  # the tla2tools.jar is pinned by URL + sha256 inside that script. See
  # specs/README.md.
  tla-model-check:
    name: TLA+ Model Check (multi-writer coordination)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Run TLA+ model checks
        run: bash specs/run-checks.sh
