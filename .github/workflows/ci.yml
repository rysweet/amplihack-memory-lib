name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Rust Tests & Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check formatting
        working-directory: rust/amplihack-memory
        run: cargo fmt --check

      - name: Clippy (default features)
        working-directory: rust/amplihack-memory
        run: cargo clippy -- -D warnings

      - name: Clippy (ladybug feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features ladybug -- -D warnings

      - name: Clippy (python feature)
        working-directory: rust/amplihack-memory
        run: cargo clippy --features python -- -D warnings

      - name: Run tests
        working-directory: rust/amplihack-memory
        run: cargo test

      - name: Run tests (ladybug feature)
        working-directory: rust/amplihack-memory
        run: cargo test --features ladybug

      # kuzu feature requires pyo3 (needs Python) and may need a running Kuzu DB
      # instance for integration tests — allow failure until CI has Kuzu provisioned.
      - name: Run tests (kuzu feature)
        working-directory: rust/amplihack-memory
        continue-on-error: true
        run: cargo test --features kuzu

      - name: Run tests (python feature)
        working-directory: rust/amplihack-memory
        run: cargo test --features python

      - name: Build docs
        working-directory: rust/amplihack-memory
        run: cargo doc --no-deps

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Security audit
        working-directory: rust/amplihack-memory
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Supply chain check
        working-directory: rust/amplihack-memory
        run: cargo deny check

  msrv:
    name: MSRV (1.80) Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install cmake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: dtolnay/rust-toolchain@1.80

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/amplihack-memory/target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('rust/amplihack-memory/Cargo.lock', 'rust/amplihack-memory/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msrv-

      - name: Run tests (MSRV)
        working-directory: rust/amplihack-memory
        run: cargo test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -x --tb=short
