# The specs/*.tla and *.cfg files are copied VERBATIM from a TLC-model-checked
# source and pinned by sha256 (see specs/README.md + tests/test_tla_specs.py).
# Mutating hooks (end-of-file-fixer / trailing-whitespace) must not rewrite them
# or the byte-identity check breaks, so they are excluded alongside .claude/runtime/.
exclude: '^(\.claude/runtime/|specs/.*\.(tla|cfg)$)'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --manifest-path rust/amplihack-memory/Cargo.toml --
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --manifest-path rust/amplihack-memory/Cargo.toml -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        entry: cargo test --manifest-path rust/amplihack-memory/Cargo.toml --quiet
        language: system
        types: [rust]
        pass_filenames: false
